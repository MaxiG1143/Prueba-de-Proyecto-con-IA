<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Enlaces a los recursos externos --->
    <script
      src="https://kit.fontawesome.com/29c3be7601.js"
      crossorigin="anonymous"
    ></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="./assets/css/styles.css" />

<!-- Titulo de la pagina web --->
    <title>Nosotros</title>
</head>
<body class="Nosotros">
<style>
  :root{--bg1:#020617;--bg2:#071032;--accent:#00f0ff;--magenta:#c400ff}
  html,body{height:100%;margin:0;font-family:'Orbitron',monospace;color:#e6f7ff}
  body.nosotros{background:radial-gradient(ellipse at top left,rgba(0,240,255,0.06),transparent 20%),linear-gradient(135deg,var(--bg1),var(--bg2));padding:40px}
  h5{color:var(--accent);text-shadow:0 0 12px rgba(0,240,255,0.18);margin:0 0 12px}
  p{color:transparent;text-shadow:0 0 18px rgba(196,0,255,0.18);font-weight:700}
  .formulario{display:flex;gap:10px;align-items:center;margin:12px 0 22px}
  .formulario_input{background:rgba(255,255,255,0.03);border:1px solid rgba(0,240,255,0.12);padding:12px 16px;border-radius:999px;color:#e6f7ff;outline:none;backdrop-filter:blur(6px)}
  .formulario_input:focus{box-shadow:0 0 18px rgba(0,240,255,0.14)}
  .gradient-btn{background:linear-gradient(90deg,var(--accent),var(--magenta));border:none;color:#021016;padding:10px 18px;border-radius:999px;cursor:pointer;font-weight:700}
  .cargador-iphone{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;margin-top:18px}
  .cargador-iphone img{width:100%;height:160px;object-fit:cover;border-radius:12px;border:1px solid rgba(255,255,255,0.04);box-shadow:0 6px 30px rgba(0,0,0,0.6),0 0 18px rgba(0,240,255,0.06);transition:transform .35s,filter .35s}
  .cargador-iphone img:hover{transform:translateY(-6px) scale(1.03);filter:drop-shadow(0 0 18px rgba(0,240,255,0.25)) saturate(130%)}
  a[title]{display:inline-block;margin-top:22px;color:var(--accent);text-decoration:none;padding:8px 14px;border-radius:8px;border:1px solid rgba(0,240,255,0.08);box-shadow:0 6px 20px rgba(0,0,0,0.5);backdrop-filter:blur(4px)}
  @media (max-width:480px){.cargador-iphone img{height:120px}}
</style>
    
<!-- Enlace a la página principal --->
    <a href="index.html" title="enlace a la página principal">Inicio</a>
</body>
</html>
